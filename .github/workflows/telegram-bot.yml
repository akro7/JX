name: AKRO GOXI Telegram Bot

# GitHub Actions can't run a true 24/7 process for free, so this workflow
# re-triggers itself every 5 minutes and polls Telegram for ~4.5 minutes
# each run. It's the same "poor man's always-on bot" trick used for the
# opencode.ai/zen bot before — good enough for a low-traffic key bot.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: akrogoxi-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bot (bounded poll window)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SITE_API_URL: ${{ secrets.SITE_API_URL }}
          BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}
          POLL_SECONDS: "270"
        run: python telegram-bot/bot.py

      - name: Persist bot state (offset + sessions)
        run: |
          git config user.name "akrogoxi-bot"
          git config user.email "akrogoxi-bot@users.noreply.github.com"
          git add telegram-bot/.offset telegram-bot/.sessions.json || true
          git diff --cached --quiet || git commit -m "chore: bot state [skip ci]"
          git push || true
